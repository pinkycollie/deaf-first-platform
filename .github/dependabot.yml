# .github/dependabot.yml - COMPLETE VERSION
version: 2
updates:
  # Root dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      root-deps:
        patterns: ["*"]
    
  # Frontend workspace
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    groups:
      frontend-deps:
        patterns: ["*"]
  
  # Backend workspace
  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "weekly"
  
  # Services
  - package-ecosystem: "npm"
    directory: "/services/deafauth"
    schedule:
      interval: "weekly"
  
  - package-ecosystem: "npm"
    directory: "/services/pinksync"
    schedule:
      interval: "weekly"
  
  - package-ecosystem: "npm"
    directory: "/services/fibonrose"
    schedule:
      interval: "weekly"
  
  - package-ecosystem: "npm"
    directory: "/services/accessibility-nodes"
    schedule:
      interval: "weekly"
  
  # AI workspace
  - package-ecosystem: "npm"
    directory: "/ai"
    schedule:
      interval: "weekly"
  
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
